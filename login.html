<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Wij gaan trouwen</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%8D%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;700&display=swap">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="login-wrap">
    <main class="login-kaart">
      <h1>Wij gaan trouwen</h1>
      <p>Deze pagina is beveiligd. Vul het wachtwoord in dat je bij de uitnodiging hebt gekregen.</p>
      <form action="/api/login" method="POST">
        <input type="password" name="wachtwoord" placeholder="Wachtwoord" autocomplete="current-password" autofocus required>
        <button type="submit">Bekijk uitnodiging</button>
      </form>
      <p class="fout" id="fout">Dat wachtwoord klopt helaas niet. Probeer het nog eens.</p>
    </main>
  </div>
  <script>
    if (new URLSearchParams(location.search).has('fout')) {
      document.getElementById('fout').classList.add('zichtbaar');
    }
  </script>
</body>
</html>
